<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CI/CD Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .status {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(205,250,255,0.2);
            border-radius: 10px;



            
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CI/CD Pipeline Active!</h1>
        <p>This page was automatically deployed via Jenkins.</p>
        <div class="status">
            <p>Build successful.</p>
        </div>
    </div>
</body>
</html>
